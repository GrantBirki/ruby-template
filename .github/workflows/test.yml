name: test

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test
    runs-on: ubuntu-latest

    steps:
      - uses: GrantBirki/fence@6a3889083ef6c2b097bdde644113141e6f04e9e3
        with:
          mode: block

      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6
        with:
          persist-credentials: false

      - uses: ruby/setup-ruby@4c56a21280b36d862b5fc31348f463d60bdc55d5 # pin@v1.301.0
        with:
          bundler: none
          bundler-cache: false

      - name: bootstrap
        run: script/bootstrap

      - name: test
        run: script/test

      - name: fence check
        shell: bash
        run: |
          set -euo pipefail

          echo "checking allowed GitHub API access"
          curl --fail --silent --show-error --max-time 10 \
            --head https://api.github.com >/dev/null

          echo "checking unrelated outbound traffic is blocked"
          if curl --fail --silent --show-error --max-time 10 \
            --head https://www.google.com >/dev/null; then
            echo "::error::Fence unexpectedly allowed www.google.com"
            exit 1
          fi
